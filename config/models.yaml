defaults:
  # Phase 1 default: moonshot-v1-8k — cheap, supports temperature=0 (needed
  # for strict-JSON triage). kimi-k2.5 / kimi-k2.6 are more capable but FORCE
  # temperature=1; use those as per-role overrides for planner/implementer
  # in Phase 2 where some sampling is acceptable.
  provider: moonshot
  api_base: https://api.moonshot.ai/v1
  model: moonshot-v1-8k
  temperature: 0.1
  max_tokens: 2000

roles:
  triager:     { temperature: 0.0, max_tokens: 200 }
  planner:     { temperature: 0.2, max_tokens: 1500 }
  locator:     { temperature: 0.0, max_tokens: 800 }
  implementer: { temperature: 0.2, max_tokens: 4000 }
  tester:      { temperature: 0.1, max_tokens: 2000 }
  critic:      { temperature: 0.2, max_tokens: 1500 }
  pr_writer:   { temperature: 0.3, max_tokens: 1000 }
